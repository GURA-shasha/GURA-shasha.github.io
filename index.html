
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 针对苹果手机优化：禁止系统级缩放，防止地图滑动时页面跟着放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>中国各省地图 - 天地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "微软雅黑", sans-serif; overflow: hidden; }

        #header {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6da3 100%);
            color: white; padding: 12px 20px; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 1000; position: relative;
        }
        #header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        #header .current-location {
            font-size: 14px; background: rgba(255,255,255,0.15);
            padding: 6px 16px; border-radius: 20px; backdrop-filter: blur(4px);
        }

        #map { width: 100%; height: calc(100vh - 52px); }

        /* 鼠标悬停省份时显示小手，提示可点击 */
        .leaflet-interactive:hover { cursor: pointer; }

        .province-label {
            background: none !important; border: none !important; box-shadow: none !important;
            font-size: 11px; font-weight: bold; color: #2c3e50; white-space: nowrap;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }

        .back-btn {
            position: absolute; top: 70px; left: 15px; z-index: 1000; background: white;
            border: none; padding: 10px 18px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 14px; font-weight: bold; color: #1a3a5c;
            display: none; transition: all 0.3s ease;
        }
        .back-btn:hover { background: #1a3a5c; color: white; transform: scale(1.05); }

        .legend {
            position: absolute; bottom: 30px; right: 15px; z-index: 1000; background: white;
            padding: 12px 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 12px; line-height: 2;
        }
        .legend-title { font-weight: bold; margin-bottom: 4px; color: #1a3a5c; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 20px; height: 12px; border-radius: 2px; border: 1px solid #999; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; align-items: center;
            justify-content: center; z-index: 9999; flex-direction: column; gap: 16px;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6da3; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 优化弹窗样式 */
        .info-popup .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .info-popup .leaflet-popup-content {
            margin: 16px 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div style="color:#1a3a5c; font-size:16px; font-weight:bold;">正在加载中国地图数据...</div>
    </div>

    <div id="header">
        <h1>🗺️ 中国各省地图</h1>
        <div class="current-location" id="currentLocation">当前视图：全国</div>
    </div>

    <div id="map"></div>
    <button class="back-btn" id="backBtn">← 返回全国</button>

    <div class="legend">
        <div class="legend-title">图例说明</div>
        <div class="legend-item">
            <div class="legend-color" style="background:rgba(45,109,163,0.15);"></div>
            <span>全国底图</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:rgba(255,152,0,0.6); border: 2px solid #e65100;"></div>
            <span>省份高亮图层</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ==================== 配置 ====================
        const TIANDITU_TK = 'YOUR_TIANDITU_KEY'; // <-- 替换为你的天地图Key

        const provinceData = {
            "北京市": { center: [39.9042, 116.4074], zoom: 9, capital: "北京", area: "1.64万km²" },
            "天津市": { center: [39.0842, 117.2010], zoom: 9, capital: "天津", area: "1.19万km²" },
            "河北省": { center: [38.0428, 114.5149], zoom: 7, capital: "石家庄", area: "18.88万km²" },
            "山西省": { center: [37.8706, 112.5489], zoom: 7, capital: "太原", area: "15.67万km²" },
            "内蒙古自治区": { center: [40.8183, 111.7653], zoom: 6, capital: "呼和浩特", area: "118.3万km²" },
            "辽宁省": { center: [41.8057, 123.4315], zoom: 7, capital: "沈阳", area: "14.8万km²" },
            "吉林省": { center: [43.8868, 125.3245], zoom: 7, capital: "长春", area: "18.74万km²" },
            "黑龙江省": { center: [45.7430, 126.6617], zoom: 6, capital: "哈尔滨", area: "47.3万km²" },
            "上海市": { center: [31.2304, 121.4737], zoom: 10, capital: "上海", area: "0.63万km²" },
            "江苏省": { center: [32.0603, 118.7969], zoom: 7, capital: "南京", area: "10.72万km²" },
            "浙江省": { center: [30.2741, 120.1551], zoom: 7, capital: "杭州", area: "10.55万km²" },
            "安徽省": { center: [31.8612, 117.2830], zoom: 7, capital: "合肥", area: "14.01万km²" },
            "福建省": { center: [26.0745, 119.2965], zoom: 7, capital: "福州", area: "12.4万km²" },
            "江西省": { center: [28.6765, 115.8924], zoom: 7, capital: "南昌", area: "16.69万km²" },
            "山东省": { center: [36.6683, 116.9972], zoom: 7, capital: "济南", area: "15.8万km²" },
            "河南省": { center: [34.7466, 113.6254], zoom: 7, capital: "郑州", area: "16.7万km²" },
            "湖北省": { center: [30.5928, 114.3055], zoom: 7, capital: "武汉", area: "18.59万km²" },
            "湖南省": { center: [28.2280, 112.9388], zoom: 7, capital: "长沙", area: "21.18万km²" },
            "广东省": { center: [23.1291, 113.2644], zoom: 7, capital: "广州", area: "17.97万km²" },
            "广西壮族自治区": { center: [22.8170, 108.3669], zoom: 7, capital: "南宁", area: "23.76万km²" },
            "海南省": { center: [19.2000, 109.8500], zoom: 7, capital: "海口", area: "3.54万km²" },
            "重庆市": { center: [29.5630, 106.5516], zoom: 8, capital: "重庆", area: "8.24万km²" },
            "四川省": { center: [30.5728, 104.0668], zoom: 6, capital: "成都", area: "48.6万km²" },
            "贵州省": { center: [26.6470, 106.6302], zoom: 7, capital: "贵阳", area: "17.62万km²" },
            "云南省": { center: [25.0389, 102.7183], zoom: 6, capital: "昆明", area: "39.41万km²" },
            "西藏自治区": { center: [29.6500, 91.1000], zoom: 6, capital: "拉萨", area: "122.84万km²" },
            "陕西省": { center: [34.2658, 108.9541], zoom: 7, capital: "西安", area: "20.56万km²" },
            "甘肃省": { center: [36.0611, 103.8343], zoom: 6, capital: "兰州", area: "42.58万km²" },
            "青海省": { center: [36.6171, 101.7782], zoom: 6, capital: "西宁", area: "72.23万km²" },
            "宁夏回族自治区": { center: [38.4872, 106.2309], zoom: 7, capital: "银川", area: "6.64万km²" },
            "新疆维吾尔自治区": { center: [43.7930, 87.6271], zoom: 5, capital: "乌鲁木齐", area: "166.49万km²" },
            "台湾省": { center: [23.6978, 120.9605], zoom: 7, capital: "台北", area: "3.6万km²" },
            "香港特别行政区": { center: [22.3193, 114.1694], zoom: 10, capital: "香港", area: "1106km²" },
            "澳门特别行政区": { center: [22.1987, 113.5439], zoom: 12, capital: "澳门", area: "33km²" }
        };

        const nameMapping = {
            "北京": "北京市", "天津": "天津市", "河北": "河北省", "山西": "山西省",
            "内蒙古": "内蒙古自治区", "辽宁": "辽宁省", "吉林": "吉林省", "黑龙江": "黑龙江省",
            "上海": "上海市", "江苏": "江苏省", "浙江": "浙江省", "安徽": "安徽省",
            "福建": "福建省", "江西": "江西省", "山东": "山东省", "河南": "河南省",
            "湖北": "湖北省", "湖南": "湖南省", "广东": "广东省", "广西": "广西壮族自治区",
            "海南": "海南省", "重庆": "重庆市", "四川": "四川省", "贵州": "贵州省",
            "云南": "云南省", "西藏": "西藏自治区", "陕西": "陕西省", "甘肃": "甘肃省",
            "青海": "青海省", "宁夏": "宁夏回族自治区", "新疆": "新疆维吾尔自治区",
            "台湾": "台湾省", "香港": "香港特别行政区", "澳门": "澳门特别行政区"
        };

        // ==================== 初始化地图 ====================
        const map = L.map('map', {
            center: [35.8617, 104.1954],
            zoom: 4,
            minZoom: 3,
            maxZoom: 18,
            zoomControl: true
        });

        const tdtVecLayer = L.tileLayer(`https://t{s}.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'], attribution: '© 天地图' });
        const tdtCvaLayer = L.tileLayer(`https://t{s}.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] });
        const tdtImgLayer = L.tileLayer(`https://t{s}.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] });

        tdtVecLayer.addTo(map);
        tdtCvaLayer.addTo(map);

        const baseLayers = { "矢量地图": tdtVecLayer, "卫星影像": tdtImgLayer };
        const overlays = { "地名注记": tdtCvaLayer };
        const layerControl = L.control.layers(baseLayers, overlays, { position: 'topright', collapsed: false }).addTo(map);

        let geojsonLayer = null;
        let currentHighlightLayer = null;
        let provinceLabels = [];

        // ==================== 加载数据 ====================
        const GEOJSON_URL = './china.json'; 

        fetch(GEOJSON_URL)
            .then(res => {
                if (!res.ok) throw new Error('数据加载失败');
                return res.json();
            })
            .then(data => {
                renderProvinces(data);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loading').innerHTML = '<div style="color:red;text-align:center;"><h3>地图数据加载失败</h3><p>请确保同级目录下存在 china.json 文件</p></div>';
            });

        // ==================== 渲染全国底图 ====================
        function renderProvinces(geojsonData) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            provinceLabels.forEach(label => map.removeLayer(label));
            provinceLabels = [];

            geojsonLayer = L.geoJSON(geojsonData, {
                style: {
                    fillColor: 'rgba(45, 109, 163, 0.1)',
                    weight: 1, opacity: 0.8, color: '#7faacc', fillOpacity: 0.1
                },
                onEachFeature: function(feature, layer) {
                    const name = feature.properties.name;
                    const fullName = nameMapping[name] || name;

                    layer.on('mouseover', function(e) {
                        if (!currentHighlightLayer || currentHighlightLayer.feature !== feature) {
                            this.setStyle({ fillColor: 'rgba(45, 109, 163, 0.3)', weight: 2, color: '#1a3a5c' });
                        }
                        layer.bindTooltip(`<strong>${fullName}</strong><br>点击查看详情`, { sticky: true }).openTooltip(e.latlng);
                    });

                    layer.on('mouseout', function(e) {
                        if (!currentHighlightLayer || currentHighlightLayer.feature !== feature) {
                            geojsonLayer.resetStyle(this);
                        }
                        layer.unbindTooltip();
                    });

                    // 核心点击事件
                    layer.on('click', function(e) {
                        L.DomEvent.stopPropagation(e); // 阻止事件冒泡，防止点击没反应
                        createProvinceOverlay(feature, fullName, e.latlng);
                    });

                    const center = feature.properties.centroid || feature.properties.center;
                    if (center && center.length >= 2) {
                        const label = L.marker([center[1], center[0]], {
                            icon: L.divIcon({
                                className: 'province-label',
                                html: name.replace(/省|市|自治区|壮族|回族|维吾尔|特别行政区/g, ''),
                                iconSize: [60, 20], iconAnchor: [30, 10]
                            }),
                            interactive: false
                        });
                        label.addTo(map);
                        provinceLabels.push(label);
                    }
                }
            }).addTo(map);
        }

        // ==================== 核心：创建独立的省份高亮图层 + 强制弹窗 ====================
        function createProvinceOverlay(feature, provinceName, clickLatlng) {
            // 1. 清除旧图层 (加 try-catch 防止报错中断)
            if (currentHighlightLayer) {
                map.removeLayer(currentHighlightLayer);
                try { layerControl.removeLayer(currentHighlightLayer); } catch(e) {}
            }
            map.closePopup(); // 先关闭所有旧弹窗

            // 2. 创建高亮图层
            currentHighlightLayer = L.geoJSON(feature, {
                style: {
                    fillColor: '#ff9800', fillOpacity: 0.5,
                    color: '#e65100', weight: 4, opacity: 1
                }
            }).addTo(map);
            
            currentHighlightLayer.feature = feature;
            layerControl.addOverlay(currentHighlightLayer, `📍 ${provinceName}`);

            // 3. 强制在点击位置弹出信息框 (解决弹窗不显示的问题)
            const pData = provinceData[provinceName] || {};
            const popupContent = `
                <div style="font-size:18px; font-weight:bold; color:#d84315; border-bottom:2px solid #ff9800; padding-bottom:6px; margin-bottom:8px;">
                    ${provinceName}
                </div>
                <div style="font-size:14px; color:#333; line-height: 1.8;">
                    <div>🏛️ <strong>省会/首府：</strong>${pData.capital || '—'}</div>
                    <div>📐 <strong>面积：</strong>${pData.area || '—'}</div>
                </div>
                <div style="font-size:12px; color:#888; margin-top:10px; border-top: 1px dashed #ccc; padding-top: 6px;">
                    💡 提示：正在尝试加载市/县级地图...<br>
                    <span style="color:#999;">(若未显示市界，是因国外服务器访问国内数据受限)</span>
                </div>
            `;
            
            L.popup({ maxWidth: 280, className: 'info-popup', closeButton: true })
                .setLatLng(clickLatlng) // 在你鼠标点击的位置弹出
                .setContent(popupContent)
                .openOn(map);

            // 4. 视角飞入
            map.flyToBounds(currentHighlightLayer.getBounds(), {
                padding: [50, 50], duration: 1.2, maxZoom: 8
            });

            // 5. 尝试加载下级市/县地图 (如果 403 会静默失败，不影响主流程)
            loadSubProvince(feature);
            
            // 更新 UI
            document.getElementById('currentLocation').textContent = `当前视图：${provinceName}`;
            document.getElementById('backBtn').style.display = 'block';
        }

        // ==================== 加载市/县级地图 (带容错处理) ====================
        function loadSubProvince(parentFeature) {
            const adcode = parentFeature.properties.adcode;
            if (!adcode) return;

            const subUrl = `https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`;
            
            fetch(subUrl)
                .then(res => {
                    if (!res.ok) throw new Error('市级数据 403 或 404');
                    return res.json();
                })
                .then(subData => {
                    if (subData && subData.features) {
                        const subLayer = L.geoJSON(subData, {
                            style: { color: '#27ae60', weight: 1.5, fillColor: 'rgba(46,204,113,0.1)', fillOpacity: 0.1 },
                            onEachFeature: function(f, l) {
                                l.on('mouseover', function() { this.setStyle({ weight: 3, color: '#1e8449', fillOpacity: 0.3 }); });
                                l.on('mouseout', function() { subLayer.resetStyle(this); });
                                l.bindTooltip(f.properties.name, { sticky: true });
                            }
                        }).addTo(map);
                    }
                })
                .catch(err => {
                    // 如果因为 GitHub 在国外导致 403，这里会捕获错误，不会导致页面卡死
                    console.warn('加载市/县级地图失败 (网络或跨域限制):', err.message);
                });
        }

        // ==================== 返回全国视图 ====================
        function backToChina() {
            if (currentHighlightLayer) {
                map.removeLayer(currentHighlightLayer);
                try { layerControl.removeLayer(currentHighlightLayer); } catch(e) {}
                currentHighlightLayer = null;
            }
            map.closePopup();
            if (geojsonLayer) geojsonLayer.eachLayer(l => geojsonLayer.resetStyle(l));
            map.flyTo([35.8617, 104.1954], 4, { duration: 1.2 });
            document.getElementById('currentLocation').textContent = '当前视图：全国';
            document.getElementById('backBtn').style.display = 'none';
        }

        // ==================== 事件绑定 ====================
        document.getElementById('backBtn').addEventListener('click', backToChina);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') backToChina();
        });
    </script>
</body>
</html>
