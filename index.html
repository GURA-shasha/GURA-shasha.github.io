<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>中国各省地图 - 天地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "微软雅黑", sans-serif; overflow: hidden; }

        #header {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6da3 100%);
            color: white; padding: 12px 20px; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 1000; position: relative;
        }
        #header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }

        #map { width: 100%; height: calc(100vh - 52px); }
        .leaflet-interactive:hover { cursor: pointer; }

        .province-label {
            background: none !important; border: none !important; box-shadow: none !important;
            font-size: 11px; font-weight: bold; color: #2c3e50; white-space: nowrap;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; align-items: center;
            justify-content: center; z-index: 9999; flex-direction: column; gap: 16px;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6da3; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ==================== 独立弹窗 (Modal) 样式 ==================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 2000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; width: 92%; height: 88%; max-width: 1200px;
            border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6da3 100%);
            color: white; display: flex; justify-content: space-between;
            align-items: center; flex-shrink: 0;
        }
        .modal-title-wrapper { display: flex; align-items: center; gap: 12px; }
        .modal-header h2 { margin: 0; font-size: 18px; font-weight: 600; }
        
        .back-province-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer;
            font-size: 13px; display: none; transition: background 0.2s;
        }
        .back-province-btn:hover { background: rgba(255,255,255,0.4); }

        .modal-close-btn {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 32px; height: 32px; border-radius: 50%; font-size: 20px; 
            cursor: pointer; line-height: 1; display: flex; align-items: center;
            justify-content: center; transition: background 0.2s;
        }
        .modal-close-btn:hover { background: rgba(255,255,255,0.4); }
        .modal-map-container { flex: 1; width: 100%; position: relative; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div style="color:#1a3a5c; font-size:16px; font-weight:bold;">正在加载中国地图数据...</div>
    </div>

    <div id="header">
        <h1>🗺️ 中国各省地图</h1>
    </div>

    <div id="map"></div>

    <!-- 独立的省份地图弹窗 -->
    <div class="modal-overlay" id="provinceModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrapper">
                    <button class="back-province-btn" id="backProvinceBtn">↩ 返回全省</button>
                    <h2 id="modalTitle">省份地图</h2>
                </div>
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-map-container" id="modalMap"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TIANDITU_TK = 'a3d07d5c107386e408b8063af41d92e5'; 

        const nameMapping = {
            "北京": "北京市", "天津": "天津市", "河北": "河北省", "山西": "山西省",
            "内蒙古": "内蒙古自治区", "辽宁": "辽宁省", "吉林": "吉林省", "黑龙江": "黑龙江省",
            "上海": "上海市", "江苏": "江苏省", "浙江": "浙江省", "安徽": "安徽省",
            "福建": "福建省", "江西": "江西省", "山东": "山东省", "河南": "河南省",
            "湖北": "湖北省", "湖南": "湖南省", "广东": "广东省", "广西": "广西壮族自治区",
            "海南": "海南省", "重庆": "重庆市", "四川": "四川省", "贵州": "贵州省",
            "云南": "云南省", "西藏": "西藏自治区", "陕西": "陕西省", "甘肃": "甘肃省",
            "青海": "青海省", "宁夏": "宁夏回族自治区", "新疆": "新疆维吾尔自治区",
            "台湾": "台湾省", "香港": "香港特别行政区", "澳门": "澳门特别行政区"
        };

        const mainMap = L.map('map', { center: [35.8617, 104.1954], zoom: 4, minZoom: 3, maxZoom: 18 });
        const tdtVecLayer = L.tileLayer(`https://t{s}.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'], attribution: '© 天地图' });
        const tdtCvaLayer = L.tileLayer(`https://t{s}.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] });
        
        tdtVecLayer.addTo(mainMap);
        tdtCvaLayer.addTo(mainMap);

        let chinaGeojsonLayer = null;
        let modalMapInstance = null;
        let currentProvinceName = '';
        let currentCityLayer = null;
        let provinceLayer = null;
        let cityLayersGroup = null;

        fetch('./china.json')
            .then(res => res.ok ? res.json() : Promise.reject('加载失败'))
            .then(data => {
                renderNationalMap(data);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(() => {
                document.getElementById('loading').innerHTML = '<div style="color:red;text-align:center;"><h3>数据加载失败</h3><p>请确保同级目录下存在 china.json</p></div>';
            });

        function renderNationalMap(geojsonData) {
            chinaGeojsonLayer = L.geoJSON(geojsonData, {
                style: { fillColor: 'rgba(45, 109, 163, 0.1)', weight: 1, color: '#7faacc', fillOpacity: 0.1 },
                onEachFeature: function(feature, layer) {
                    const name = feature.properties.name;
                    const fullName = nameMapping[name] || name;

                    layer.on('mouseover', function() {
                        // 鲜艳的高亮：亮橙色
                        this.setStyle({ fillColor: '#ff9800', fillOpacity: 0.6, weight: 3, color: '#e65100' });
                        this.bringToFront();
                        layer.bindTooltip(`<strong>${fullName}</strong><br>点击查看独立地图`, { sticky: true }).openTooltip();
                    });
                    layer.on('mouseout', function() {
                        chinaGeojsonLayer.resetStyle(this);
                        layer.unbindTooltip();
                    });
                    layer.on('click', function(e) {
                        L.DomEvent.stopPropagation(e);
                        openProvinceModal(feature, fullName);
                    });

                    const center = feature.properties.centroid || feature.properties.center;
                    if (center && center.length >= 2) {
                        L.marker([center[1], center[0]], {
                            icon: L.divIcon({
                                className: 'province-label',
                                html: name.replace(/省|市|自治区|壮族|回族|维吾尔|特别行政区/g, ''),
                                iconSize: [60, 20], iconAnchor: [30, 10]
                            }),
                            interactive: false
                        }).addTo(mainMap);
                    }
                }
            }).addTo(mainMap);
        }

        function openProvinceModal(feature, provinceName) {
            currentProvinceName = provinceName;
            const modal = document.getElementById('provinceModal');
            document.getElementById('modalTitle').textContent = `📍 ${provinceName}`;
            modal.classList.add('active');

            if (modalMapInstance) {
                modalMapInstance.remove();
                modalMapInstance = null;
            }

            setTimeout(() => {
                modalMapInstance = L.map('modalMap', { zoomControl: true, attributionControl: false });
                
                L.tileLayer(`https://t{s}.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] }).addTo(modalMapInstance);
                L.tileLayer(`https://t{s}.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${TIANDITU_TK}`, { subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] }).addTo(modalMapInstance);

                // 鲜艳的省界：粉红色
                provinceLayer = L.geoJSON(feature, {
                    style: { fillColor: '#e91e63', fillOpacity: 0.25, color: '#c2185b', weight: 3 }
                }).addTo(modalMapInstance);

                modalMapInstance.fitBounds(provinceLayer.getBounds(), { padding: [40, 40] });
                loadSubProvinceForModal(feature, modalMapInstance);
            }, 100); 
        }

        function zoomToCity(cityFeature, cityLayer) {
            // 淡化省界
            provinceLayer.setStyle({ fillOpacity: 0.05, opacity: 0.3, weight: 1 });
            
            // 淡化其他市，高亮当前市 (亮青色)
            cityLayersGroup.eachLayer(l => {
                if (l === cityLayer) {
                    l.setStyle({ fillColor: '#00bcd4', fillOpacity: 0.6, color: '#00838f', weight: 3 });
                    l.bringToFront();
                } else {
                    l.setStyle({ fillOpacity: 0.05, opacity: 0.3, weight: 1 });
                }
            });
            
            modalMapInstance.fitBounds(cityLayer.getBounds(), { padding: [50, 50], maxZoom: 12 });
            
            document.getElementById('modalTitle').textContent = `📍 ${currentProvinceName} > ${cityFeature.properties.name}`;
            document.getElementById('backProvinceBtn').style.display = 'inline-block';
            currentCityLayer = cityLayer;
        }

        function backToProvince() {
            // 恢复省界
            provinceLayer.setStyle({ fillColor: '#e91e63', fillOpacity: 0.25, color: '#c2185b', weight: 3, opacity: 1 });
            
            // 恢复所有市界
            cityLayersGroup.eachLayer(l => {
                l.setStyle({ fillColor: 'rgba(76, 175, 80, 0.1)', fillOpacity: 0.1, color: '#388e3c', weight: 1.5, opacity: 1 });
            });
            
            modalMapInstance.fitBounds(provinceLayer.getBounds(), { padding: [40, 40] });
            
            document.getElementById('modalTitle').textContent = `📍 ${currentProvinceName}`;
            document.getElementById('backProvinceBtn').style.display = 'none';
            currentCityLayer = null;
        }

        function loadSubProvinceForModal(parentFeature, targetMap) {
            const adcode = parentFeature?.properties?.adcode;
            if (!adcode) return;

            fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`)
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(subData => {
                    if (subData?.features && targetMap) { 
                        cityLayersGroup = L.geoJSON(subData, {
                            style: { color: '#388e3c', weight: 1.5, fillColor: 'rgba(76, 175, 80, 0.1)', fillOpacity: 0.1 },
                            onEachFeature: function(f, l) {
                                l.on('mouseover', function() { 
                                    if (currentCityLayer !== l) {
                                        this.setStyle({ weight: 2.5, fillOpacity: 0.4, fillColor: 'rgba(76, 175, 80, 0.4)' }); 
                                    }
                                });
                                l.on('mouseout', function() { 
                                    if (currentCityLayer !== l) {
                                        this.setStyle({ weight: 1.5, fillOpacity: 0.1, fillColor: 'rgba(76, 175, 80, 0.1)' }); 
                                    }
                                });
                                l.on('click', function(e) {
                                    L.DomEvent.stopPropagation(e);
                                    zoomToCity(f, l);
                                });
                                l.bindTooltip(f.properties.name, { sticky: true });
                            }
                        }).addTo(targetMap);
                    }
                })
                .catch(() => {
                    // 403 报错时的友好提示
                    const tip = L.control.attribution({ prefix: '' });
                    tip.addAttribution('<span style="color:#d32f2f; font-weight:bold; background:rgba(255,255,255,0.8); padding:2px 6px; border-radius:4px;">⚠️ 受 GitHub 国外网络限制，市级数据加载失败(403)。部署到国内服务器即可正常显示。</span>');
                    tip.addTo(targetMap);
                });
        }

        function closeProvinceModal() {
            document.getElementById('provinceModal').classList.remove('active');
            if (modalMapInstance) {
                modalMapInstance.remove();
                modalMapInstance = null;
            }
            currentCityLayer = null;
            currentProvinceName = '';
            document.getElementById('backProvinceBtn').style.display = 'none';
        }

        // ==================== 事件绑定 ====================
        document.getElementById('closeModalBtn').addEventListener('click', closeProvinceModal);
        document.getElementById('backProvinceBtn').addEventListener('click', backToProvince);
        
        document.getElementById('provinceModal').addEventListener('click', function(e) {
            if (e.target === this) closeProvinceModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeProvinceModal();
        });
    </script>
</body>
</html>
